<!DOCTYPE html>
<html>
<head>
  <title>Ultimate Deals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background:#f1f3f6;
    }

    /* Header */
    .header {
      background:#2874f0;
      padding:10px;
      display:flex;
      align-items:center;
      color:white;
      position:sticky;
      top:0;
    }

    .logo {
      font-size:18px;
      font-weight:bold;
    }

    .search {
      flex:1;
      margin-left:10px;
    }

    .search input {
      width:100%;
      padding:7px;
      border:none;
      border-radius:4px;
    }

    /* Categories */
    .categories {
      display:flex;
      overflow-x:auto;
      background:white;
      padding:10px;
      gap:15px;
      font-size:13px;
    }

    .categories div {
      white-space:nowrap;
    }

    /* Banner */
    .banner img {
      width:100%;
      height:140px;
      object-fit:cover;
    }

    /* Products */
    .products {
      display:grid;
      grid-template-columns: repeat(2,1fr);
      gap:8px;
      padding:8px;
    }

    .card {
      background:white;
      border-radius:8px;
      padding:8px;
      text-align:center;
    }

    .card img {
      width:100%;
      height:110px;
      object-fit:contain;
    }

    .title {
      font-size:13px;
      margin:5px 0;
    }

    .price {
      color:green;
      font-weight:bold;
      font-size:14px;
    }

    .btn {
      background:#fb641b;
      color:white;
      padding:7px;
      display:block;
      margin-top:6px;
      text-decoration:none;
      border-radius:4px;
      font-size:13px;
    }

    /* Desktop responsive */
    @media(min-width:768px){
      .products{
        grid-template-columns: repeat(4,1fr);
      }
    }
  </style>
</head>

<body>

<!-- Header -->
<div class="header">
  <div class="logo">Ultimate Deals</div>
  <div class="search">
    <input type="text" placeholder="Search products...">
  </div>
</div>

<!-- Categories -->
<div class="categories">
  <div>Mobiles</div>
  <div>Gaming</div>
  <div>Electronics</div>
  <div>Fashion</div>
  <div>Accessories</div>
</div>

<!-- Banner -->
<div class="banner">
  <img src="https://via.placeholder.com/600x140">
</div>

<!-- Products -->

  </div>

  </div>
